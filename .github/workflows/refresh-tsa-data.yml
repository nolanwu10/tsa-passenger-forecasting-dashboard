name: Refresh TSA data

on:
  schedule:
    # TSA generally updates the prior day's checkpoint volume in the morning.
    # Run after the usual US Eastern morning update window.
    - cron: "0 15 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-tsa-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch TSA passenger data
        run: python scripts/fetch_tsa_data.py

      - name: Commit updated TSA data
        run: |
          if git diff --quiet -- data/raw/tsa_passenger_data.csv; then
            echo "No TSA data changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/raw/tsa_passenger_data.csv
          git commit -m "Refresh TSA passenger data"
          git push
